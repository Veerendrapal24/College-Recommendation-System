<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users - College Recommender</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link th:href="@{/css/custom.css}" rel="stylesheet">
  <style>
    .sort-icon {
      margin-left: 5px;
      font-size: 0.8rem;
      opacity: 0.5;
    }
    .sort-header {
      cursor: pointer;
    }
    .sort-header:hover .sort-icon {
      opacity: 1;
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <!-- Collapsible Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-header">
      <a class="sidebar-logo" href="#">
        <i class="fas fa-graduation-cap"></i>
        <h3>Recommender</h3>
      </a>
      <button class="btn btn-sm btn-link text-secondary sidebar-toggle-btn d-none d-md-inline-block">
        <i class="fas fa-bars"></i>
      </button>
    </div>
    
    <div class="sidebar-menu">
      <a th:href="@{/admin/dashboard}" class="sidebar-nav-link">
        <i class="fas fa-chart-pie"></i>
        <span class="sidebar-text">Dashboard</span>
      </a>
      <a th:href="@{/admin/colleges}" class="sidebar-nav-link">
        <i class="fas fa-university"></i>
        <span class="sidebar-text">Manage Colleges</span>
      </a>
      <a th:href="@{/admin/branches}" class="sidebar-nav-link">
        <i class="fas fa-code-branch"></i>
        <span class="sidebar-text">Manage Branches</span>
      </a>
      <a th:href="@{/admin/performance}" class="sidebar-nav-link">
        <i class="fas fa-chart-line"></i>
        <span class="sidebar-text">Performance Metrics</span>
      </a>
      <a th:href="@{/admin/users}" class="sidebar-nav-link active">
        <i class="fas fa-users"></i>
        <span class="sidebar-text">View Users</span>
      </a>
    </div>
    
    <div class="sidebar-footer">
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="sidebar-nav-link border-0 bg-transparent w-100 text-start">
          <i class="fas fa-sign-out-alt"></i>
          <span class="sidebar-text">Logout</span>
        </button>
      </form>
    </div>
  </aside>

  <!-- Main Content Panel -->
  <main class="admin-main">
    <!-- Top Navbar Row -->
    <header class="admin-navbar">
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm btn-outline-secondary d-md-none" onclick="document.querySelector('.admin-sidebar').classList.toggle('show-mobile')">
          <i class="fas fa-bars"></i>
        </button>
        <h4 class="mb-0 text-primary">Users</h4>
      </div>
      
      <div class="d-flex align-items-center gap-3">
        <!-- Theme Toggle -->
        <div class="theme-toggle-btn me-2" onclick="toggleTheme()" title="Toggle Theme">
          <i class="fas fa-moon"></i>
        </div>
        
        <!-- Profile Avatar Widget -->
        <div class="d-flex align-items-center gap-2">
          <div class="avatar-circle">
            <span th:text="${#strings.substring(adminName ?: 'A', 0, 1)}">A</span>
          </div>
          <div class="d-none d-lg-block">
            <div class="small fw-bold" th:text="${adminName} ?: 'Administrator'">Admin</div>
            <div class="text-tertiary" style="font-size: 0.75rem;" th:text="${adminEmail} ?: 'admin@college.edu'">admin@college.edu</div>
          </div>
        </div>
      </div>
    </header>

    <!-- Success/Error Alerts -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
      <strong>Success!</strong> <span th:text="${successMessage}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
      <strong>Error!</strong> <span th:text="${errorMessage}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Actions Bar -->
    <div class="saas-card mb-4">
      <div class="row g-3 align-items-center">
        <div class="col-md-4">
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-search text-tertiary"></i></span>
            <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="Search by name, email..." onkeyup="onSearchChange()">
          </div>
        </div>
        
        <div class="col-md-3">
          <select id="roleFilter" class="form-select" onchange="onFilterChange()">
            <option value="">All Roles</option>
            <option value="ADMIN">ADMIN</option>
            <option value="STUDENT">STUDENT</option>
          </select>
        </div>
        
        <div class="col-md-2">
          <button class="btn btn-secondary-custom w-100" onclick="clearSearchFilters()">
            <i class="fas fa-undo me-1"></i> Clear
          </button>
        </div>
        
        <div class="col-md-3 text-end">
          <button class="btn btn-primary-custom w-100 py-2" data-bs-toggle="modal" data-bs-target="#userModal" onclick="resetForm()">
            <i class="fas fa-plus-circle me-1"></i> Add User
          </button>
        </div>
      </div>
    </div>

    <!-- Table Container -->
    <div class="saas-table-container">
      <table class="saas-table" id="usersTable">
        <thead>
          <tr>
            <th class="sort-header" onclick="sortTable(0)">ID <i class="fas fa-sort sort-icon"></i></th>
            <th class="sort-header" onclick="sortTable(1)">Full Name <i class="fas fa-sort sort-icon"></i></th>
            <th class="sort-header" onclick="sortTable(2)">Email <i class="fas fa-sort sort-icon"></i></th>
            <th class="sort-header" onclick="sortTable(3)">Role <i class="fas fa-sort sort-icon"></i></th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user : ${users}">
            <td th:text="${user.id}">1</td>
            <td>
              <div class="d-flex align-items-center gap-3">
                <div class="avatar-circle" style="background-color: #6366f1;">
                  <span th:text="${#strings.substring(user.name ?: 'U', 0, 1)}">U</span>
                </div>
                <div class="fw-bold" th:text="${user.name}">John Doe</div>
              </div>
            </td>
            <td th:text="${user.email}">john@example.com</td>
            <td>
              <span th:if="${user.role.name() == 'ADMIN'}" class="badge-custom badge-admin">ADMIN</span>
              <span th:unless="${user.role.name() == 'ADMIN'}" class="badge-custom badge-student">STUDENT</span>
            </td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <button type="button" class="btn btn-sm btn-warning text-white px-3"
                        th:data-id="${user.id}"
                        th:data-name="${user.name}"
                        th:data-email="${user.email}"
                        th:data-role="${user.role}"
                        onclick="editUserFromButton(this)"
                        data-bs-toggle="modal" data-bs-target="#userModal">
                  <i class="fas fa-edit"></i> Edit
                </button>
                <a th:href="@{/admin/users/delete/{id}(id=${user.id})}"
                   class="btn btn-sm btn-danger px-3"
                   th:if="${#authentication.principal.username != user.email}"
                   onclick="return confirm('Are you sure you want to delete this user?')">
                  <i class="fas fa-trash"></i> Delete
                </a>
                <span th:if="${#authentication.principal.username == user.email}" class="text-muted small ps-2"><i class="fas fa-user-shield me-1"></i>You</span>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="5" class="text-center text-muted py-4">
              No users found. <a href="#" data-bs-toggle="modal" data-bs-target="#userModal" onclick="resetForm()">Add the first user</a>
            </td>
          </tr>
        </tbody>
      </table>
      
      <!-- Pagination Row -->
      <div class="d-flex justify-content-between align-items-center p-3 border-top" style="background-color: var(--bg-secondary);">
        <div class="small text-secondary" id="paginationInfo">Showing 1 to 10 of 12 users</div>
        <nav>
          <ul class="pagination pagination-sm mb-0 gap-1" id="paginationControls">
            <!-- Buttons dynamically generated -->
          </ul>
        </nav>
      </div>
    </div>
  </main>
</div>

<!-- Modal Form -->
<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass-card border-0">
      <form id="userForm" action="/admin/users/save" method="post">
        <div class="modal-header border-bottom-0 pb-0">
          <h5 class="modal-title fw-bold" id="modalTitle">Add User</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body py-4">
          <input type="hidden" id="userId" name="id" value="0"/>

          <div class="mb-3">
            <label for="userName" class="form-label small fw-bold text-secondary">Full Name <span class="text-danger">*</span></label>
            <input type="text" id="userName" name="name" class="form-control" required placeholder="Enter full name">
          </div>

          <div class="mb-3">
            <label for="userEmail" class="form-label small fw-bold text-secondary">Email Address <span class="text-danger">*</span></label>
            <input type="email" id="userEmail" name="email" class="form-control" required placeholder="e.g. user@domain.com">
          </div>

          <div class="mb-3">
            <label for="userPassword" class="form-label small fw-bold text-secondary">Password <span class="text-danger" id="passwordRequiredStar">*</span></label>
            <input type="password" id="userPassword" name="password" class="form-control" placeholder="Enter password">
            <div class="form-text small" id="passwordHelp"></div>
          </div>

          <div class="mb-3">
            <label for="userRole" class="form-label small fw-bold text-secondary">Role <span class="text-danger">*</span></label>
            <select id="userRole" name="role" class="form-select" required>
              <option value="">Select Role</option>
              <option th:each="role : ${roles}"
                      th:value="${role}"
                      th:text="${role}"></option>
            </select>
          </div>
        </div>
        <div class="modal-footer border-top-0 pt-0">
          <button type="button" class="btn btn-secondary-custom" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary-custom" id="submitBtn">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/custom.js}"></script>
<script>
  function resetForm() {
    document.getElementById('modalTitle').textContent = 'Add User';
    document.getElementById('submitBtn').textContent = 'Save';

    document.getElementById('userId').value = '';
    document.getElementById('userName').value = '';
    document.getElementById('userEmail').value = '';
    document.getElementById('userPassword').value = '';
    document.getElementById('userPassword').required = true;
    document.getElementById('passwordRequiredStar').style.display = 'inline';
    document.getElementById('passwordHelp').textContent = '';
    document.getElementById('userRole').value = '';
  }

  function editUserFromButton(button) {
    const id = button.getAttribute('data-id');
    const name = button.getAttribute('data-name');
    const email = button.getAttribute('data-email');
    const role = button.getAttribute('data-role');

    document.getElementById('modalTitle').textContent = 'Edit User';
    document.getElementById('submitBtn').textContent = 'Update';

    document.getElementById('userId').value = id;
    document.getElementById('userName').value = name;
    document.getElementById('userEmail').value = email;
    document.getElementById('userPassword').value = '';
    document.getElementById('userPassword').required = false;
    document.getElementById('passwordRequiredStar').style.display = 'none';
    document.getElementById('passwordHelp').textContent = 'Leave blank to keep current password.';
    document.getElementById('userRole').value = role;
  }

  // --- Dynamic Search, Filter, Sort, Pagination Logic ---
  let tableRows = [];
  let currentPage = 1;
  const pageSize = 8;
  let sortColumnIndex = -1;
  let sortDirection = true; // true = ASC, false = DESC

  document.addEventListener('DOMContentLoaded', function() {
    const tbody = document.querySelector('tbody');
    const rows = Array.from(tbody.querySelectorAll('tr'));
    tableRows = rows.filter(row => row.cells.length > 1);
    
    renderTable();
  });

  function onSearchChange() {
    currentPage = 1;
    renderTable();
  }

  function onFilterChange() {
    currentPage = 1;
    renderTable();
  }

  function clearSearchFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('roleFilter').value = '';
    currentPage = 1;
    renderTable();
  }

  function sortTable(columnIndex) {
    if (sortColumnIndex === columnIndex) {
      sortDirection = !sortDirection;
    } else {
      sortColumnIndex = columnIndex;
      sortDirection = true;
    }
    
    const headers = document.querySelectorAll('thead th');
    headers.forEach((th, idx) => {
      const icon = th.querySelector('.sort-icon');
      if (icon) {
        if (idx === columnIndex) {
          icon.className = sortDirection ? 'fas fa-sort-up sort-icon' : 'fas fa-sort-down sort-icon';
          icon.style.opacity = '1';
        } else {
          icon.className = 'fas fa-sort sort-icon';
          icon.style.opacity = '0.5';
        }
      }
    });

    tableRows.sort((a, b) => {
      let aVal = a.cells[columnIndex].textContent.toLowerCase().trim();
      let bVal = b.cells[columnIndex].textContent.toLowerCase().trim();

      if (columnIndex === 0) {
        return (parseInt(aVal) - parseInt(bVal)) * (sortDirection ? 1 : -1);
      }

      return aVal.localeCompare(bVal) * (sortDirection ? 1 : -1);
    });

    renderTable();
  }

  function renderTable() {
    const searchVal = document.getElementById('searchInput').value.toLowerCase().trim();
    const roleVal = document.getElementById('roleFilter').value;
    const tbody = document.querySelector('tbody');

    const filteredRows = tableRows.filter(row => {
      const id = row.cells[0].textContent.toLowerCase();
      const name = row.cells[1].textContent.toLowerCase();
      const email = row.cells[2].textContent.toLowerCase();
      const role = row.cells[3].textContent.trim(); // ADMIN or STUDENT

      const matchesSearch = id.includes(searchVal) || name.includes(searchVal) || email.includes(searchVal);
      const matchesRole = roleVal === '' || role === roleVal;

      return matchesSearch && matchesRole;
    });

    tableRows.forEach(row => row.style.display = 'none');
    
    const totalItems = filteredRows.length;
    const totalPages = Math.ceil(totalItems / pageSize) || 1;
    if (currentPage > totalPages) currentPage = totalPages;

    const startIdx = (currentPage - 1) * pageSize;
    const endIdx = Math.min(startIdx + pageSize, totalItems);

    for (let i = startIdx; i < endIdx; i++) {
      filteredRows[i].style.display = '';
    }

    let emptyRow = document.getElementById('noMatchingRow');
    if (totalItems === 0) {
      if (!emptyRow) {
        emptyRow = document.createElement('tr');
        emptyRow.id = 'noMatchingRow';
        emptyRow.innerHTML = '<td colspan="5" class="text-center text-muted py-4">No matching records found</td>';
        tbody.appendChild(emptyRow);
      } else {
        emptyRow.style.display = '';
      }
    } else {
      if (emptyRow) emptyRow.style.display = 'none';
    }

    const showingStart = totalItems === 0 ? 0 : startIdx + 1;
    document.getElementById('paginationInfo').textContent = `Showing ${showingStart} to ${endIdx} of ${totalItems} users`;

    const controls = document.getElementById('paginationControls');
    controls.innerHTML = '';

    controls.innerHTML += `
      <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
        <a class="page-link" href="#" onclick="changePage(${currentPage - 1}); return false;"><i class="fas fa-chevron-left"></i></a>
      </li>
    `;

    for (let p = 1; p <= totalPages; p++) {
      controls.innerHTML += `
        <li class="page-item ${currentPage === p ? 'active' : ''}">
          <a class="page-link" href="#" onclick="changePage(${p}); return false;">${p}</a>
        </li>
      `;
    }

    controls.innerHTML += `
      <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
        <a class="page-link" href="#" onclick="changePage(${currentPage + 1}); return false;"><i class="fas fa-chevron-right"></i></a>
      </li>
    `;
  }

  function changePage(page) {
    currentPage = page;
    renderTable();
  }
</script>
</body>
</html>
