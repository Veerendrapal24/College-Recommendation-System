<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found - 404</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #1e2640 0%, #0f1322 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background decorations */
    .glow-sphere {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0) 70%);
      top: -100px;
      left: -100px;
      z-index: 1;
    }

    .glow-sphere-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, rgba(236, 72, 153, 0) 70%);
      bottom: -150px;
      right: -150px;
      z-index: 1;
    }

    .container {
      text-align: center;
      z-index: 2;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 50px 80px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      max-width: 600px;
      width: 90%;
      transform: translateY(0);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .error-code {
      font-size: 130px;
      font-weight: 800;
      margin: 0;
      line-height: 1;
      background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-top: 20px;
      margin-bottom: 10px;
      color: #f3f4f6;
    }

    p {
      color: #9ca3af;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn-home {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
      transition: all 0.3s ease;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
      background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
    }

    @media (max-width: 480px) {
      .container {
        padding: 40px 20px;
      }
      .error-code {
        font-size: 100px;
      }
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="glow-sphere"></div>
  <div class="glow-sphere-2"></div>

  <div class="container">
    <div class="error-code">404</div>
    <h1>Lost in Space?</h1>
    <p>We couldn't find the page you're looking for. It might have been moved, deleted, or never existed in the first place.</p>
    <a href="/" class="btn-home">Back to Safety</a>
  </div>

</body>
</html>
