<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - College Recommender</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link th:href="@{/css/custom.css}" rel="stylesheet">
  <style>
    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-secondary);
      z-index: 10;
    }
    .input-group-custom {
      position: relative;
    }
  </style>
</head>
<body>

<div class="auth-split-container">
  <!-- Left Graphic Side -->
  <div class="auth-graphic-side">
    <div class="text-center p-4">
      <i class="fas fa-user-plus mb-4" style="font-size: 5rem;"></i>
      <h1 class="display-4 fw-extrabold mb-3 text-white">Join the Community</h1>
      <p class="fs-5 text-white-50 max-w-lg mx-auto">
        Create an account today to discover the best private and government intermediate junior colleges matching your goals.
      </p>
    </div>
  </div>

  <!-- Right Form Side -->
  <div class="auth-form-side">
    <div class="d-flex justify-content-between align-items-center mb-5">
      <a th:href="@{/}" class="btn btn-secondary-custom btn-sm">
        <i class="fas fa-arrow-left me-2"></i> Home
      </a>
      <div class="theme-toggle-btn animate-rotate" onclick="toggleTheme()" title="Toggle Theme">
        <i class="fas fa-moon"></i>
      </div>
    </div>

    <div class="w-100 mx-auto" style="max-width: 420px;">
      <h2 class="display-6 fw-bold mb-2">Create Account</h2>
      <p class="text-secondary mb-4">Fill in your information to register a new user.</p>

      <!-- Alert Handlers -->
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <form th:action="@{/signup}" method="post" th:object="${user}">
        <!-- Full Name input -->
        <div class="mb-3">
          <label for="name" class="form-label text-secondary small fw-semibold">Full Name</label>
          <input type="text" class="form-control ps-4" id="name" th:field="*{name}"
                 placeholder="John Doe" required>
        </div>

        <!-- Email input -->
        <div class="mb-3">
          <label for="email" class="form-label text-secondary small fw-semibold">Email Address</label>
          <input type="email" class="form-control ps-4" id="email" th:field="*{email}"
                 placeholder="name@college.com" required>
        </div>

        <!-- Password input -->
        <div class="mb-3">
          <label for="password" class="form-label text-secondary small fw-semibold">Password</label>
          <div class="input-group-custom mb-1">
            <input type="password" class="form-control ps-4 pe-5" id="password" th:field="*{password}"
                   placeholder="Create a password (min 8 chars)" required minlength="8">
            <i class="far fa-eye toggle-password" onclick="togglePasswordVisibility('password', this)"></i>
          </div>
          <small class="form-text text-muted">Use at least 8 characters</small>
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-4">
          <i class="fas fa-user-plus me-2"></i> Register
        </button>
      </form>

      <p class="text-center text-secondary small mb-0">
        Already have an account? <a th:href="@{/login}" class="text-decoration-none text-primary fw-semibold">Sign in</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/custom.js}"></script>
<script>
  function togglePasswordVisibility(fieldId, icon) {
    const field = document.getElementById(fieldId);
    if (field.type === 'password') {
      field.type = 'text';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    } else {
      field.type = 'password';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    }
  }
</script>
</body>
</html>
